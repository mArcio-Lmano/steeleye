name: CI & Release

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - "*"
  push:
    tags:
      - "v*"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13.7"

      - name: Install Poetry and dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry install

      - name: Run lint
        run: make lint

      - name: Check formatting
        run: make format

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13.7"

      - name: Install Poetry and dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry install

      - name: Run tests
        run: make test

  release:
    runs-on: ubuntu-latest
    needs: [lint, tests]
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.13.7"

      - name: Install Poetry and dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry install

      - name: Build project
        run: poetry build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.3
        with:
          files: dist/*
